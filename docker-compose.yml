networks:
  coffee-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  elasticsearch_data:
  jaeger_data:
  prometheus_data:
  grafana_data:

services:
  mysql:
    image: mysql:8.0
    container_name: coffee_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/auth-service/migrations/init.sql:/docker-entrypoint-initdb.d/01-auth.sql
      - ./services/user-service/migrations/init.sql:/docker-entrypoint-initdb.d/02-user.sql
      - ./services/user-service/migrations/02-settings.sql:/docker-entrypoint-initdb.d/02b-settings.sql
      - ./services/product-service/migrations/init.sql:/docker-entrypoint-initdb.d/03-product.sql
      - ./services/category-service/migrations/init.sql:/docker-entrypoint-initdb.d/04-category.sql
      - ./services/inventory-service/migrations/init.sql:/docker-entrypoint-initdb.d/05-inventory.sql
      - ./services/order-service/migrations/init.sql:/docker-entrypoint-initdb.d/06-order.sql
      - ./services/payment-service/migrations/init.sql:/docker-entrypoint-initdb.d/07-payment.sql
      - ./services/analytics-service/migrations/init.sql:/docker-entrypoint-initdb.d/08-analytics.sql
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --innodb-buffer-pool-size=256M
      --max-connections=200

  redis:
    image: redis:7-alpine
    container_name: coffee_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: coffee_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: coffee_vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: coffee_api_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - PRODUCT_SERVICE_URL=http://product-service:3003
      - CATEGORY_SERVICE_URL=http://category-service:3004
      - INVENTORY_SERVICE_URL=http://inventory-service:3005
      - ORDER_SERVICE_URL=http://order-service:3006
      - PAYMENT_SERVICE_URL=http://payment-service:3007
      - ANALYTICS_SERVICE_URL=http://analytics-service:3012
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network
    volumes:
      - uploads_data:/app/uploads

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: coffee_auth_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=auth_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/coffee_vhost
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: coffee_user_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=user_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coffee-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: coffee_product_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3003
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=product_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coffee-network
    volumes:
      - uploads_data:/app/uploads

  category-service:
    build:
      context: .
      dockerfile: services/category-service/Dockerfile
    container_name: coffee_category_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3004
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=category_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coffee-network

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: coffee_inventory_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3005
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=inventory_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/coffee_vhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: coffee_order_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3006
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=order_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/coffee_vhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: coffee_payment_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3007
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=payment_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/coffee_vhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: coffee_analytics_service
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=3012
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=analytics_db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/coffee_vhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - coffee-network

  # =====================================================
  # MONITORING & OBSERVABILITY STACK
  # =====================================================

  # ── Elasticsearch (Centralized Logging) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: coffee_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Kibana (Log Visualization) ──
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: coffee_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - coffee-network

  # ── Jaeger (Distributed Tracing) ──
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: coffee_jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - MEMORY_MAX_TRACES=10000
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"   # UI
      - "14268:14268"   # HTTP collector
      - "14250:14250"
      - "9411:9411"
    volumes:
      - jaeger_data:/var/lib/jaeger
    networks:
      - coffee-network

  # ── Prometheus (Metrics) ──
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: coffee_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - coffee-network

  # ── Grafana (Dashboards) ──
  grafana:
    image: grafana/grafana:10.2.0
    container_name: coffee_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - coffee-network

  # ── Consul (Service Discovery) ──
  consul:
    image: hashicorp/consul:1.17
    container_name: coffee_consul
    restart: unless-stopped
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"   # UI + API
      - "8600:8600/udp" # DNS
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - coffee-network
